version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: testgenai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testgenai
    ports:
      - '5433 :5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: